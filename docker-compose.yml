services:
  # Backend API with Hot Reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: easycheck-backend:dev
    container_name: easycheck-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3001
      NODE_OPTIONS: "--max-old-space-size=1024"
    mem_limit: 2g
    memswap_limit: 2g
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - easycheck-network
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: npm run dev

  # Frontend with Hot Reload  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: easycheck-frontend:dev
    container_name: easycheck-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    mem_limit: 3g
    memswap_limit: 3g
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      WATCHPACK_POLLING: "false"
      CHOKIDAR_USEPOLLING: "false"
      NODE_OPTIONS: "--max-old-space-size=1024 --disable-warning=UnhandledPromiseRejection"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
      - /app/.turbo
    depends_on:
      - backend
    networks:
      - easycheck-network
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: npx next dev -H 0.0.0.0

networks:
  easycheck-network:
    driver: bridge
