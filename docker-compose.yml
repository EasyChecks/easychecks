services:
  # Backend API with Hot Reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: easycheck-backend:dev
    container_name: easycheck-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3001
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - easycheck-network
    command: npm run dev

  # Frontend with Hot Reload  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    # image=
    image: easycheck-frontend:dev
    container_name: easycheck-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # when running via docker-compose use internal network name
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Required on Windows: Docker Desktop does not forward inotify events
      # into the Linux container — polling is needed for HMR to detect changes.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      # Use anonymous volume to prevent node_modules from being overwritten by host
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - easycheck-network
    command: npx next dev -H 0.0.0.0 --webpack

networks:
  easycheck-network:
    driver: bridge
