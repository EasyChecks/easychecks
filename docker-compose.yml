services:
  # Backend API with Hot Reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: easycheck-backend:dev
    container_name: easycheck-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
    volumes:
      # Mount source code for hot reload
      - ./backend:/app
      # Use anonymous volume to prevent node_modules from showing red in VS Code
      - /app/node_modules
    networks:
      - easycheck-network
    command: npm run dev

  # Frontend with Hot Reload  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: easycheck-frontend:dev
    container_name: easycheck-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      # Use anonymous volume to prevent node_modules from showing red in VS Code
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - easycheck-network
    command: npm run dev

networks:
  easycheck-network:
    driver: bridge
